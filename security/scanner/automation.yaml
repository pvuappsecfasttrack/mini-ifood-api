env:
  contexts:
    - name: "target-context"
      urls:
        - "http://127.0.0.1:8080" 
  parameters:
    failOnError: false
    failOnWarning: false
    progressToStdout: true

jobs:
  # Baseline-style exploration (no active attack):
  # spider + passive scan processing.
  - type: spider
    parameters:
      context: "target-context"
      url: "http://127.0.0.1:8080" 
      maxDuration: 5

  - type: passiveScan-wait
    parameters:
      maxDuration: 5

  # Produce an HTML report consumed by ASFT upload/view flow.
  - type: report
    parameters:
      template: "traditional-html"
      reportDir: "/zap/wrk"
      reportFile: "zap-baseline-report.html"
      displayReport: false
