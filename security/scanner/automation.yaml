env:
  contexts:
    - name: "mini-ifood-auth"
      urls:
        - "http://127.0.0.1:8080"
      includePaths:
        - "http://127.0.0.1:8080/.*"
      excludePaths:
        - "http://127.0.0.1:8080/api/auth/register"
        - "http://127.0.0.1:8080/api/auth/login"
  parameters:
    failOnError: false
    failOnWarning: false
    progressToStdout: true

jobs:
  - type: openapi
    parameters:
      apiUrl: "http://127.0.0.1:8080/v3/api-docs"
      context: "mini-ifood-auth"
      targetUrl: "http://127.0.0.1:8080"

  - type: replacer
    parameters:
      deleteAllRules: true
    rules:
      - description: "Inject bearer token for authenticated API scan"
        enabled: true
        matchType: "REQ_HEADER"
        matchRegex: false
        matchString: "Authorization"
        replacement: "Bearer ${ZAP_AUTH_TOKEN}"

  - type: spider
    parameters:
      context: "mini-ifood-auth"
      url: "http://127.0.0.1:8080"
      maxDuration: 5

  - type: activeScan
    parameters:
      context: "mini-ifood-auth"
      maxRuleDurationInMins: 2
      maxScanDurationInMins: 20
      addQueryParam: true

  - type: passiveScan-wait
    parameters:
      maxDuration: 10

  - type: report
    parameters:
      template: "traditional-html"
      reportDir: "/zap/wrk"
      reportFile: "zap-auth-report.html"
      displayReport: false
